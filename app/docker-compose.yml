# =============================================================================
# Docker Compose for Local Development
# =============================================================================
# Usage:
#   Development:  docker compose up --build
#   Background:   docker compose up -d --build
#   Logs:         docker compose logs -f app
#   Stop:         docker compose down
#   Clean:        docker compose down -v --rmi local
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: express-ts-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_VERSION=${APP_VERSION:-1.0.0}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Resource limits matching ECS task definition
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Development service with hot-reload
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: express-ts-app-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./src:/app/src:ro
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
    profiles:
      - dev
    restart: unless-stopped

networks:
  default:
    name: express-app-network
