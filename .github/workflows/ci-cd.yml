# =============================================================================
# CI/CD Pipeline - Build, Push to ECR, Deploy to ECS
# =============================================================================
# Triggers on push to main branch
# Builds Docker image, pushes to ECR, and deploys via CDKTF
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'iac/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  APP_NAME: ${{ vars.APP_NAME || 'express-ts-app' }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ===========================================================================
  # Metadata Extraction (for dynamic resource names)
  # ===========================================================================
  metadata:
    name: Extract Metadata
    runs-on: ubuntu-latest
    outputs:
      ecr_repository: ${{ steps.extract.outputs.ecr_repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iac/package-lock.json

      - name: Install CDKTF dependencies
        working-directory: ./iac
        run: npm ci

      - name: Synthesize and Extract
        id: extract
        working-directory: ./iac
        env:
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_aws_account_id: '000000000000' # Placeholder for synth
        run: |
          npx cdktf synth
          REPO_NAME=$(jq -r '.resource.aws_ecr_repository.ecr_repo.name' cdktf.out/stacks/express-ts-app-${{ env.ENVIRONMENT }}/cdk.tf.json)
          echo "ecr_repository=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "Detected ECR Repo: $REPO_NAME"

  # ===========================================================================
  # Build and Test
  # ===========================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: metadata
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Run linting
        working-directory: ./app
        run: npm run lint || true

      - name: Run tests
        working-directory: ./app
        run: npm test

      - name: Build application
        working-directory: ./app
        run: npm run build

  # ===========================================================================
  # Docker Build and Push to ECR
  # ===========================================================================
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, metadata]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_uri: ${{ steps.build-push.outputs.image_uri }}

    env:
      ECR_REPOSITORY: ${{ needs.metadata.outputs.ecr_repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.run_number }}

      - name: Output image URI
        id: output-uri
        run: |
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ needs.metadata.outputs.ecr_repository }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Deploy Infrastructure with CDKTF
  # ===========================================================================
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [docker, metadata]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: ${{ steps.deploy.outputs.app_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iac/package-lock.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDKTF dependencies
        working-directory: ./iac
        run: npm install

      - name: Generate Terraform configuration
        working-directory: ./iac
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_image_tag: ${{ needs.docker.outputs.image_tag }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME || '' }}
          TF_VAR_hosted_zone_id: ${{ vars.HOSTED_ZONE_ID || '' }}
          TF_VAR_enable_https: ${{ vars.ENABLE_HTTPS || 'false' }}
        run: npx cdktf synth

      - name: Deploy infrastructure
        id: deploy
        working-directory: ./iac
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_image_tag: ${{ needs.docker.outputs.image_tag }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME || '' }}
          TF_VAR_hosted_zone_id: ${{ vars.HOSTED_ZONE_ID || '' }}
          TF_VAR_enable_https: ${{ vars.ENABLE_HTTPS || 'false' }}
        run: |
          npx cdktf deploy --auto-approve
          
          # Extract outputs
          cd cdktf.out/stacks/express-ts-app-*
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "app_url=http://${ALB_URL}" >> $GITHUB_OUTPUT

      - name: Verify deployment
        run: |
          echo "🚀 Deployment completed!"
          echo "📊 Health check: ${{ steps.deploy.outputs.app_url }}/health"
          
          # Wait for service to be healthy
          sleep 30
          
          # Verify health endpoint
          curl -sf "${{ steps.deploy.outputs.app_url }}/health" || echo "Warning: Health check pending..."

  # ===========================================================================
  # Cleanup on PR Close
  # ===========================================================================
  cleanup:
    name: Cleanup Preview Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Note
        run: echo "Preview environment cleanup would happen here for PR environments"
